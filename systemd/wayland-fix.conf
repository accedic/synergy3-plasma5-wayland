# /etc/systemd/user/synergy.service.d/wayland-fix.conf
# (or ~/.config/systemd/user/synergy.service.d/wayland-fix.conf)
#
# Systemd drop-in for the Synergy client service on KDE Plasma 5 Wayland.
#
# WHAT THIS DOES
# ──────────────
# 1. LD_PRELOAD — loads the hot-patch shim before synergy-core starts.
#    The shim intercepts xdp_session_connect_to_eis (which always returns -1
#    on Plasma 5 where KWin has no EIS socket) and replaces it with a function
#    that provides a real EIS server backed by /dev/uinput.
#
# 2. SYNERGY_SCREEN_W / SYNERGY_SCREEN_H — your combined virtual desktop size.
#    Synergy's DINF protocol message encodes screen dimensions as SInt16, so
#    values > 32767 wrap to negative and the server rejects the client with
#    "invalid message: DINF".  Find your correct values with:
#
#        xrandr | grep "^Screen 0" | grep -oP "current \K[0-9]+ x [0-9]+"
#
#    Then replace 4080 and 1920 below with your actual values.

[Service]
Environment="LD_PRELOAD=/home/%u/.local/lib/synergy-eis-bridge.so"
Environment="SYNERGY_SCREEN_W=4080"
Environment="SYNERGY_SCREEN_H=1920"
# XWayland display for clipboard support.
# Synergy uses X11 (XGetSelectionOwner/XSetSelectionOwner) for clipboard.
# KDE Plasma on Wayland always starts XWayland at :1.
# XAUTHORITY is session-specific — injected at login via
# autostart/synergy-xenv.desktop, which also restarts this service.
Environment="DISPLAY=:1"
